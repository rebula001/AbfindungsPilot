#
# CI - laeuft bei jedem Push auf `main` und bei jedem Pull Request.
#
# Aufgabe: die wichtigsten lokalen Checks als einzelne, gut lesbare
# CI-Schritte reproduzieren. Schlaegt etwas fehl, ist der PR / Commit rot.
#
# Was bewusst NICHT hier laeuft:
# - Deploy -> kommt in einer separaten Pages-Workflow-Datei
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # erlaubt manuelles Ausloesen ueber die GitHub-UI

# Bei mehreren Pushes auf denselben Branch nur den letzten Lauf behalten.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Lint, test, type-check, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (clean)
        run: npm ci --ignore-scripts

      - name: Format check
        run: npm run format:check

      - name: Lint check
        run: npm run lint:check

      - name: Test with coverage
        run: npm run test:coverage

      # `build:fast` reicht hier, weil format/lint bereits als eigene
      # CI-Schritte gelaufen sind. Enthalten bleiben vue-tsc + vite build.
      - name: Type-check and build
        run: npm run build:fast
