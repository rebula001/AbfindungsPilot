# SonarCloud Scanner 配置
# Token 不要写入此文件；请通过 SONAR_TOKEN 环境变量提供。

sonar.host.url=https://sonarcloud.io
sonar.organization=rebula001
sonar.projectKey=rebula001_AbfindungsPilot
sonar.projectName=AbfindungsPilot
sonar.projectVersion=1.0.0

# 源码与排除项
sonar.sources=src
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.config.js,**/*.config.ts
sonar.tests=tests
sonar.test.inclusions=tests/**/*.test.ts,tests/**/*.spec.ts
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=src/views/**,src/components/**,src/App.vue,src/main.ts,src/**/*.d.ts

# Copy-Paste-Detection 排除项
# i18n 翻译文件 (de.ts / zh.ts) 必须保持相同的对象结构 (vue-i18n 类型要求一致)，
# 这种“重复”是设计使然，应该在 CPD 中排除。
sonar.cpd.exclusions=src/i18n/**

# 编码
sonar.sourceEncoding=UTF-8

# SCM: 仓库已初始化 Git（2026-04-30），启用 SCM 传感器以获取 git blame，
# 让 SonarQube 能按“新代码 / 旧代码”维度归类 issue。
sonar.scm.disabled=false
